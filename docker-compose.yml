services:
  hh_applicant_tool:
    container_name: hh_applicant_tool
    image: hh_applicant_tool:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:ro
      - ./config:/app/config:rw
      # Пробрасываем таймзону хоста
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    environment:
      # Это не трогаем
      - CONFIG_DIR=/app/config
      # Смените или закомментируйте при проблемах
      - TERM=${TERM}
      # Если время на сервере отличается
      # - TZ=Europe/Moscow

  # Веб-панель управления. Открывается в браузере на http://localhost:8090
  # Все команды CLI, полный конфиг и AI-настройки с пробными запросами.
  # Использует тот же образ, конфиг и базу, что и основной сервис.
  hh_panel:
    extends:
      service: hh_applicant_tool
    container_name: hh_panel
    user: docker
    # Слушаем на всех интерфейсах внутри контейнера, наружу пробрасываем
    # только на localhost хоста (панель запускает любые команды — не наружу!)
    command: hh-applicant-tool webpanel --host 0.0.0.0 --port 8090
    ports:
      - "127.0.0.1:8090:8090"
    restart: unless-stopped
